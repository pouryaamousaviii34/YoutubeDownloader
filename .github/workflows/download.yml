name: دانلود ویدیو و ذخیره در ریپو

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # اجرای دستی از تب Actions

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: دریافت کدهای ریپو
        uses: actions/checkout@v4

      - name: نصب yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install yt-dlp

      - name: دانلود ویدیو
        run: |
          mkdir -p videos
          yt-dlp \
            --format "bestvideo+bestaudio/best" \
            --output "videos/%(title)s.%(ext)s" \
            --merge-output-format mp4 \
            "$(head -n1 url.txt)"

      - name: کامیت و push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/
          git diff --cached --quiet || git commit -m "دانلود خودکار ویدیو"
          git push
